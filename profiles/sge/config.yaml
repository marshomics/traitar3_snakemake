# Snakemake 7 profile for SGE / UGE (built-in generic cluster support).
#
# Run on Snakemake 7 with --profile (NOT --workflow-profile, which mishandles
# profile script paths in v7):
#
#   snakemake --use-conda --profile profiles/sge
#
# Snakemake 8+ instead reads config.v8+.yaml in this directory; on v8 use
#   snakemake --use-conda --workflow-profile profiles/sge
#
# Script names below are bare on purpose: Snakemake resolves them inside this
# profile directory. SGE h_vmem is per-slot, so the submit wrapper divides
# mem_mb by threads and converts runtime to HH:MM:SS. Override the parallel
# environment name if yours isn't "smp":  SGE_PE=threads snakemake ...

cluster: "bash profiles/sge/sge-submit.sh --rule {rule} --threads {threads} --mem-mb {resources.mem_mb} --runtime {resources.runtime}"
cluster-status: "bash profiles/sge/sge-status.sh"
cluster-cancel: "qdel"

jobs: 500
default-resources:
  - mem_mb=4000
  - runtime=60

restart-times: 2
max-jobs-per-second: 10
max-status-checks-per-second: 5
latency-wait: 60
rerun-incomplete: true
keep-going: true
printshellcmds: true
use-conda: true
# Pre-build the env on the login node first (compute nodes are often offline):
#   snakemake --use-conda --conda-create-envs-only --conda-frontend mamba --cores 4
# For a fixed shared env location, add the SAME --conda-prefix to that command and
# the run (or uncomment below):
# conda-prefix: /shared/path/to/conda-envs
