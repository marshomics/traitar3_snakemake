# SEPARATE env for the plotting/QC rules. Kept distinct from traitar3.yaml on
# purpose: editing the annotation env would change its hash and re-trigger all
# ~342k annotate jobs (software-env rerun trigger). Adding this new env instead
# touches nothing upstream.
name: traitar3-smk-plots
channels:
  - conda-forge
dependencies:
  - python >=3.10,<3.13
  - numpy >=1.21
  - pandas >=1.3
  - scipy >=1.7
  - matplotlib-base >=3.6
  # seaborn-base = seaborn without the heavy optional deps (e.g. statsmodels),
  # which the plot scripts don't use. Avoids pulling statsmodels.
  - seaborn-base >=0.12
